name: Build PDFs

on:
  push:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - run: sudo apt-get update && sudo apt-get install -y texlive-latex-base

      - run: |
          mkdir -p pdfs

          mkdir -p latex/test
          echo '\documentclass{article}\begin{document}Hello\end{document}' > latex/test/main.tex

          cd latex/test
          pdflatex main.tex
          cd -

          cp latex/test/main.pdf pdfs/test.pdf

      - run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add pdfs
          git commit -m "add pdf" || echo "no change"
          git push
