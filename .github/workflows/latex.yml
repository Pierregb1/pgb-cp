- run: |
    mkdir -p pdfs
    mkdir -p data
    mkdir -p build

    echo "[" > data/catalog.json
    first=1

    for file in latex/*; do

      if [[ "$file" == *.zip ]]; then

        name=$(basename "$file" .zip)
        echo "Unzipping $name"

        mkdir -p build/$name
        unzip -o "$file" -d build/$name

        if [ -f "build/$name/main.tex" ]; then

          cd build/$name
          pdflatex -interaction=nonstopmode main.tex
          cd -

          cp build/$name/main.pdf pdfs/$name.pdf

          # CLASSIFICATION
          lower=$(echo "$name" | tr '[:upper:]' '[:lower:]')

          matiere="math"
          [[ "$lower" == *phys* ]] && matiere="physique"

          niveau="troisième"
          [[ "$lower" == *prem* ]] && niveau="première"
          [[ "$lower" == *term* ]] && niveau="terminale"
          [[ "$lower" == *sup* ]] && niveau="supérieur"

          type="cours"
          [[ "$lower" == *exo* ]] && type="exo"
          [[ "$lower" == *ds* ]] && type="ds"
          [[ "$lower" == *corr* ]] && type="corrigé"

          if [ $first -eq 0 ]; then echo "," >> data/catalog.json; fi
          first=0

          echo "{
            \"titre\": \"$name\",
            \"pdf\": \"pdfs/$name.pdf\",
            \"matiere\": \"$matiere\",
            \"niveau\": \"$niveau\",
            \"type\": \"$type\"
          }" >> data/catalog.json

        fi
      fi
    done

    echo "]" >> data/catalog.json