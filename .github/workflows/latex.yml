name: Build PDFs

on:
  push:
    paths:
      - 'latex/**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install LaTeX
        run: |
          sudo apt-get update
          sudo apt-get install -y texlive-latex-base

      - name: Compile
        run: |
          mkdir -p pdfs
          for dir in latex/*; do
            if [ -f "$dir/main.tex" ]; then
              cd $dir
              pdflatex main.tex
              cd -
              name=$(basename $dir)
              cp $dir/main.pdf pdfs/$name.pdf
            fi
          done

      - name: Commit PDFs
        run: |
          git config user.name "bot"
          git config user.email "bot@mail.com"
          git add pdfs
          git commit -m "build pdf" || echo "no change"
          git push
