- name: Build PDFs + Catalog
  run: |
    mkdir -p pdfs
    mkdir -p data

    echo "[" > data/catalog.json
    first=1

    # 🔥 parcours robuste (gère espaces)
    find latex -mindepth 1 -maxdepth 1 -type d | while read dir; do

      if [ -f "$dir/main.tex" ]; then

        name=$(basename "$dir")

        echo "Compiling $name"

        cd "$dir"
        pdflatex -interaction=nonstopmode main.tex
        cd -

        cp "$dir/main.pdf" "pdfs/$name.pdf"

        # 🔥 NORMALISATION (clé du tri)
        lower=$(echo "$name" \
          | tr '[:upper:]' '[:lower:]' \
          | tr ' ' '_' \
          | sed 's/[éèê]/e/g' \
          | sed 's/[àâ]/a/g' \
          | sed 's/[îï]/i/g')

        # =========================
        # 🔥 TRI AMÉLIORÉ
        # =========================

        # MATIÈRE
        matiere="math"
        [[ "$lower" == *phys* || "$lower" == *meca* || "$lower" == *optique* ]] && matiere="physique"

        # NIVEAU
        niveau="autre"
        [[ "$lower" == *trois* || "$lower" == *3e* ]] && niveau="troisième"
        [[ "$lower" == *prem* || "$lower" == *1ere* ]] && niveau="première"
        [[ "$lower" == *term* || "$lower" == *bac* ]] && niveau="terminale"
        [[ "$lower" == *sup* || "$lower" == *prepa* || "$lower" == *cpge* ]] && niveau="supérieur"

        # TYPE
        type="cours"
        [[ "$lower" == *exo* || "$lower" == *exercice* ]] && type="exo"
        [[ "$lower" == *ds* || "$lower" == *devoir* || "$lower" == *controle* ]] && type="ds"
        [[ "$lower" == *corr* || "$lower" == *solution* ]] && type="corrigé"
        [[ "$lower" == *fiche* || "$lower" == *resume* ]] && type="fiche"

        # =========================
        # JSON
        # =========================

        if [ $first -eq 0 ]; then echo "," >> data/catalog.json; fi
        first=0

        echo "{
          \"titre\": \"$name\",
          \"pdf\": \"pdfs/$name.pdf\",
          \"matiere\": \"$matiere\",
          \"niveau\": \"$niveau\",
          \"type\": \"$type\"
        }" >> data/catalog.json

      fi
    done

    echo "]" >> data/catalog.json
