name: Build PDFs + Catalog

on:
  push:
    paths:
      - 'latex/**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install LaTeX
        run: |
          sudo apt-get update
          sudo apt-get install -y texlive-latex-base texlive-latex-extra texlive-lang-french

      - name: Build PDFs + Catalog
        run: |
          mkdir -p pdfs
          mkdir -p data

          echo "[" > data/catalog.json
          first=1

          for dir in latex/*; do
            if [ -f "$dir/main.tex" ]; then

              name=$(basename $dir)

              echo "Compiling $name"

              cd $dir
              pdflatex -interaction=nonstopmode main.tex
              cd -

              cp $dir/main.pdf pdfs/$name.pdf

              # 🔥 TRI AUTOMATIQUE
              lower=$(echo "$name" | tr '[:upper:]' '[:lower:]')

              matiere="math"
              [[ "$lower" == *phys* ]] && matiere="physique"

              niveau="troisième"
              [[ "$lower" == *prem* ]] && niveau="première"
              [[ "$lower" == *term* ]] && niveau="terminale"
              [[ "$lower" == *sup* ]] && niveau="supérieur"

              type="cours"
              [[ "$lower" == *exo* ]] && type="exo"
              [[ "$lower" == *ds* ]] && type="ds"
              [[ "$lower" == *corr* ]] && type="corrigé"

              if [ $first -eq 0 ]; then echo "," >> data/catalog.json; fi
              first=0

              echo "{
                \"titre\": \"$name\",
                \"pdf\": \"pdfs/$name.pdf\",
                \"matiere\": \"$matiere\",
                \"niveau\": \"$niveau\",
                \"type\": \"$type\"
              }" >> data/catalog.json

            fi
          done

          echo "]" >> data/catalog.json

      - name: Commit results
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add pdfs data/catalog.json
          git commit -m "auto build + catalog" || echo "no change"
          git push
