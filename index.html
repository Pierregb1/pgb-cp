<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cours particuliers – Pierre Garcia-Buscaylet</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="hero">
    <div class="hero-content">
      <h1>Cours particuliers de mathématiques et de physique</h1>
      <p>
        Supports de cours, feuilles d’exercices et devoirs surveillés,
        classés par matière et par niveau.
      </p>
    </div>
  </header>

  <main class="container">
    <section class="filters-card">
      <h2>Choisir un document</h2>

      <div class="filters">
        <div class="field">
          <label for="matiere">Matière</label>
          <select id="matiere">
            <option value="">-- Choisir --</option>
          </select>
        </div>

        <div class="field">
          <label for="niveau">Niveau</label>
          <select id="niveau" disabled>
            <option value="">-- Choisir --</option>
          </select>
        </div>

        <div class="field">
          <label for="type">Type</label>
          <select id="type" disabled>
            <option value="">-- Choisir --</option>
          </select>
        </div>
      </div>
    </section>

    <section class="content-grid">
      <aside class="list-card">
        <div class="list-header">
          <h2>Documents</h2>
          <input type="text" id="search" placeholder="Rechercher un titre..." />
        </div>
        <ul id="document-list" class="document-list"></ul>
      </aside>

      <section class="viewer-card">
        <div class="viewer-header">
          <h2 id="viewer-title">Aucun document sélectionné</h2>
          <a id="download-link" href="#" download class="download-btn hidden">Télécharger</a>
        </div>

        <div class="pdf-wrapper">
          <iframe id="pdf-viewer" title="Aperçu PDF"></iframe>
        </div>
      </section>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
